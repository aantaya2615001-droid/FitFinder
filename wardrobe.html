<!DOCTYPE html>
<html>
  <head>
    <title>FitFinder - My Wardrobe & Outfit Creator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <div id="menu-icon">☰</div>
      <h1>My Wardrobe & Outfit Creator</h1>
      <div id="profile-icon">👤</div>
    </header>

    <main>
      <section id="mannequin-display">
  <div class="mannequin-box">
    <h2>Recommended Outfit</h2>
    <p id="outfit-result">Click the button to generate an outfit!</p>
    <button id="generate-outfit-button">Generate Outfit 🎲</button>
  </div>
</section>

      <section id="wardrobe-items-for-creation">
        <div class="saved-items-box">
          <h2>Your Wardrobe</h2>

          <div class="clothing-category">
            <h3>Pants</h3>
            <input type="text" id="pants-item-input" class="add-item-input" placeholder="Add new item (e.g., Jeans)">
            <button id="add-to-pants-button" class="add-item-button">Add to Pants</button>
            <ul id="pants-list" class="clothing-list"></ul>
          </div>

          <div class="clothing-category">
            <h3>Shirts</h3>
            <input type="text" id="shirts-item-input" class="add-item-input" placeholder="Add new item (e.g., T-Shirt)">
            <button id="add-to-shirts-button" class="add-item-button">Add to Shirts</button>
            <ul id="shirts-list" class="clothing-list"></ul>
          </div>

          <div class="clothing-category">
            <h3>Shoes</h3>
            <input type="text" id="shoes-item-input" class="add-item-input" placeholder="Add new item (e.g., Sneakers)">
            <button id="add-to-shoes-button" class="add-item-button">Add to Shoes</button>
            <ul id="shoes-list" class="clothing-list"></ul>
          </div>

          <div id="custom-categories">
            <!-- Future feature -->
          </div>
        </div>
      </section>
    </main>

    <footer>
      <a href="trending.html" id="fire-button">🔥</a>
      <a href="index.html" id="home-button">🏠</a>
      <a href="wishlist.html" id="heart-button">❤️</a>
    </footer>

    <script src="buttoncode.js"></script>
  </body>
</html>

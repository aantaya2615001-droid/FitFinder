<!DOCTYPE html>
<html>
  <head>
    <title>FitFinder - My Wishlist</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <div id="menu-icon">☰</div>
      <h1>My Wishlist</h1>
      <div id="profile-icon">👤</div>
    </header>
    <main>
      <section id="wishlist-editor">
        <h2>Add to your Wishlist</h2>
        <input type="text" id="wishlist-item-input" placeholder="e.g., New Jacket, Fancy Shoes">
        <button id="add-to-wishlist-button">Add to Wishlist</button>
      </section>

      <section id="saved-wishlist-items">
        <h2>Your Saved Wishlist Items</h2>
        <ul id="wishlist-items-list">
          <li>No items added yet. Start adding some!</li>
        </ul>
      </section>
    </main>
    <footer>
      <a href="trending.html" id="fire-button">🔥</a>
      <a href="index.html" id="home-button">🏠</a>
      <a href="wishlist.html" id="heart-button">❤️</a>
    </footer>
  </body>
</html>
